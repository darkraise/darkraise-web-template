<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html[data-mode="dark"] { background: #09090b; color: #fafafa; }
      html[data-mode="light"] { background: #ffffff; color: #09090b; }

      .app-loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 24px;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        animation: fadeIn 0.3s ease-out;
      }

      .app-loading-logo {
        width: 48px; height: 48px;
        animation: breathe 2s ease-in-out infinite;
      }

      .app-loading-bar {
        width: 140px; height: 3px; border-radius: 3px; overflow: hidden;
        background: currentColor; opacity: 0.08;
      }

      .app-loading-bar-fill {
        width: 40%; height: 100%; border-radius: 3px;
        background: #3b82f6;
        animation: slide 1.2s ease-in-out infinite;
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.06); opacity: 1; }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(200%); }
        100% { transform: translateX(-100%); }
      }
    </style>
    <script>
      ;(function () {
        var mode = localStorage.getItem("mode") || "system"
        var resolved =
          mode === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : mode
        document.documentElement.setAttribute("data-mode", resolved)
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <img class="app-loading-logo" src="/logo.svg" alt="" />
        <div class="app-loading-bar"><div class="app-loading-bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
